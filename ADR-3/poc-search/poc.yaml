version: '3.8'

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.1
    environment:
      - ES_JAVA_OPTS=-Xms${ES_MEM_LIMIT} -Xmx${ES_MEM_LIMIT}
    ports:
      - "9200:9200"
    deploy:
      replicas: 1

  frontend:
    image: archief-frontend:v6
    ports:
      - "${FLASK_PORT}:5000"
    environment:
      - ES_URL=${ELASTICSEARCH_URL}
    deploy:
      replicas: 1